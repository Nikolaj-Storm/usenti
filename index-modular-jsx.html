<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mr. Snowman - Email Outreach Automation</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              jaguar: {
                900: '#0B2B26',
                800: '#16423C',
                700: '#1F5750',
                100: '#E8F5F3',
              },
              cream: {
                50: '#FDFBF7',
                100: '#F7F4EB',
                200: '#EBE6D9',
              },
              gold: {
                500: '#C5A065',
                600: '#B08D55',
              },
              stone: {
                100: '#f5f5f4',
                200: '#e7e5e4',
                300: '#d6d3d1',
                400: '#a8a29e',
                500: '#78716c',
                600: '#57534e',
                700: '#44403c',
                900: '#1c1917',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            animation: {
                'fade-in': 'fadeIn 0.5s ease-out forwards',
            },
            keyframes: {
                fadeIn: {
                    '0%': { opacity: '0', transform: 'translateY(10px)' },
                    '100%': { opacity: '1', transform: 'translateY(0)' },
                }
            }
          }
        }
      }
    </script>

    <!-- React and React DOM -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

    <!-- Recharts for analytics -->
    <script src="https://unpkg.com/recharts@2.5.0/dist/Recharts.js"></script>

    <!-- Babel Standalone for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      body {
        background-color: #FDFBF7;
        color: #1F2937;
        font-family: 'Inter', sans-serif;
      }
      .font-serif {
        font-family: 'Playfair Display', serif;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #F7F4EB;
      }
      ::-webkit-scrollbar-thumb {
        background: #C5A065;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #B08D55;
      }

      /* Animations */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-fade-in {
        animation: fadeIn 0.5s ease-out forwards;
      }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Load application JavaScript files in correct order -->

    <!-- 1. Configuration -->
    <script src="frontend/js/config.js"></script>

    <!-- 2. API Service Layer -->
    <script src="frontend/js/api.js"></script>

    <!-- 3. Utilities -->
    <script type="text/babel" src="frontend/js/utils/icons.js"></script>

    <!-- 4. Authentication Components -->
    <script type="text/babel" src="frontend/js/auth.js"></script>

    <!-- 5. Page Components -->
    <script type="text/babel" src="frontend/js/components/landing.js"></script>
    <script type="text/babel" src="frontend/js/components/dashboard.js"></script>
    <script type="text/babel" src="frontend/js/components/campaigns.js"></script>
    <script type="text/babel" src="frontend/js/components/contacts.js"></script>
    <script type="text/babel" src="frontend/js/components/emailAccounts.js"></script>

    <!-- 6. Main Application Component -->
    <script type="text/babel" src="frontend/js/app.js"></script>
</body>
</html>
