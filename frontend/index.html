<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Usenti - Outreach Automation</title>
  <link id="favicon" rel="icon" type="image/png">

  <!-- External Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
    rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // Dark Mode Glassmorphism - Warm Palette
            rust: {
              950: '#1A0A05',   // Darkest - deep shadows
              900: '#2D1810',   // Dark burnt umber
              800: '#4A2516',   // Rich rust
              700: '#6B3A1F',   // Medium rust
              600: '#8B4F28',   // Warm rust
              500: '#A86232',   // Terracotta
              400: '#C47A3D',   // Copper orange
              300: '#D99A5C',   // Light copper
            },
            cream: {
              50: '#FDF8F3',    // Off-white warm
              100: '#F5E6D3',   // Primary cream (CTA color)
              200: '#EBD9C4',   // Slightly darker cream
            },
            // Glass surface colors (semi-transparent whites)
            glass: {
              light: 'rgba(255, 255, 255, 0.10)',
              medium: 'rgba(255, 255, 255, 0.08)',
              dark: 'rgba(255, 255, 255, 0.05)',
              border: 'rgba(255, 255, 255, 0.10)',
            },
            // Keep legacy for compatibility during transition
            jaguar: {
              900: '#2D1810',
              800: '#4A2516',
              700: '#6B3A1F',
              100: '#F5E6D3',
            },
            gold: {
              500: '#D99A5C',
              600: '#C47A3D',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'slide-up': 'slideUp 0.4s ease-out forwards',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          },
          backdropBlur: {
            xs: '2px',
          },
          borderRadius: {
            '2xl': '16px',
            '3xl': '20px',
            '4xl': '24px',
          }
        }
      }
    }
  </script>

  <!-- React Dependencies -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Prop Types -->
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>

  <!-- Recharts (Charting Library) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>

  <!-- SheetJS (Excel/CSV parsing) -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

  <!-- Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/styles.css?v=11">
</head>

<body>
  <div id="root"></div>

  <!-- Configuration -->
  <script src="js/config.js?v=15"></script>

  <!-- API Service -->
  <script src="js/api.js?v=15"></script>

  <!-- Global React helper -->
  <script>
    // Define h globally so all components can use it
    const h = React.createElement;
  </script>

  <!-- Icon Library -->
  <script src="js/icons.js?v=15"></script>

  <!-- Components -->
  <script src="js/components/landing.js?v=15"></script>
  <script src="js/components/auth.js?v=15"></script>
  <script src="js/components/dashboard.js?v=15"></script>
  <script src="js/components/campaigns.js?v=15"></script>
  <script src="js/components/contacts.js?v=15"></script>
  <script src="js/components/emailAccounts.js?v=15"></script>
  <script src="js/components/inbox.js?v=15"></script>
  <script src="js/components/settings.js?v=15"></script>

  <!-- Main Application -->
  <script src="js/favicon.js"></script>
  <script src="js/app.js?v=15"></script>
</body>

</html>
