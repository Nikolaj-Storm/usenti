<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Usenti — LinkedIn Outreach</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 360px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(165deg, #2D1810, #1a0f0a);
      color: #FDF8F3;
      overflow: hidden;
    }

    .header {
      padding: 20px 20px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #F5E6D3, #D4A574);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: #2D1810;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 600;
      color: #F5E6D3;
      letter-spacing: -0.3px;
    }

    .header-text span {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 400;
    }

    .content {
      padding: 16px 20px;
    }

    .status-card {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 13px;
    }

    .status-row .label {
      color: rgba(255, 255, 255, 0.5);
    }

    .status-row .value {
      font-weight: 500;
    }

    .status-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .status-active {
      background-color: #34D399;
      box-shadow: 0 0 10px rgba(52, 211, 153, 0.4);
      animation: pulse-green 2s infinite;
    }

    .status-inactive {
      background-color: #6B7280;
    }

    @keyframes pulse-green {

      0%,
      100% {
        box-shadow: 0 0 6px rgba(52, 211, 153, 0.3);
      }

      50% {
        box-shadow: 0 0 12px rgba(52, 211, 153, 0.6);
      }
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
      margin: 10px 0;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      font-size: 14px;
      transition: all 0.2s;
      letter-spacing: -0.2px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #F5E6D3, #D4A574);
      color: #2D1810;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(212, 165, 116, 0.3);
    }

    .btn-danger {
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border-color: rgba(239, 68, 68, 0.3);
    }

    .activity-section {
      margin-top: 14px;
    }

    .activity-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(255, 255, 255, 0.3);
      margin-bottom: 10px;
    }

    .activity-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .activity-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-success {
      background: #34D399;
    }

    .dot-pending {
      background: #FBBF24;
    }

    .dot-error {
      background: #F87171;
    }

    .activity-text {
      color: rgba(255, 255, 255, 0.6);
      flex: 1;
    }

    .activity-time {
      color: rgba(255, 255, 255, 0.25);
      font-size: 10px;
      white-space: nowrap;
    }

    .empty-activity {
      text-align: center;
      padding: 16px;
      color: rgba(255, 255, 255, 0.25);
      font-size: 12px;
    }

    .footer {
      text-align: center;
      padding: 14px 20px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.25);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      letter-spacing: 0.3px;
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="logo-mark">U</div>
    <div class="header-text">
      <h1>Usenti LinkedIn</h1>
      <span>v1.1.0 — Outreach Automation</span>
    </div>
  </div>

  <div class="content">
    <div class="status-card">
      <div class="status-row">
        <span class="label">Status</span>
        <span class="value" id="connection-status">
          <span class="status-indicator status-inactive"></span> Not Linked
        </span>
      </div>
      <div class="divider"></div>
      <div class="status-row">
        <span class="label">Pending Tasks</span>
        <strong class="value" id="task-count">0</strong>
      </div>
      <div class="status-row" id="user-email-row" style="display: none;">
        <span class="label">Account</span>
        <span class="value" id="user-email" style="color: rgba(255,255,255,0.6); font-size: 12px;">...</span>
      </div>
      <div class="status-row" id="last-poll-row" style="display: none;">
        <span class="label">Last Sync</span>
        <span class="value" id="last-poll" style="color: rgba(255,255,255,0.4); font-size: 11px;">—</span>
      </div>
    </div>

    <button id="link-btn" class="btn btn-primary">Link to Usenti Account</button>

    <div class="activity-section" id="activity-section" style="display: none;">
      <div class="activity-title">Recent Activity</div>
      <div id="activity-list">
        <div class="empty-activity">No recent activity</div>
      </div>
    </div>
  </div>

  <div class="footer">
    Keep Chrome open for LinkedIn automation &bull; usenti.com
  </div>

  <script src="popup.js"></script>
</body>

</html>
