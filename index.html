<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=frontend/index.html" />
    <title>Usenti - Redirecting...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom right, #221B16, #3F2E24, #221B16);
            min-height: 100vh;
            overflow: hidden;
        }
        .lava-lamp {
            position: fixed;
            inset: 0;
            overflow: hidden;
        }
        .blob {
            position: absolute;
            top: 100%;
            background: #E8D5B7;
            border-radius: 50%;
            box-shadow: 0 0 45px rgba(232,213,183,0.65);
            opacity: 0.82;
            animation: lava-rise linear infinite;
        }
        @keyframes lava-rise {
            0%   { transform: translateY(110vh) translateX(0px)   scale(1)     rotate(0deg); }
            15%  { transform: translateY(78vh)  translateX(18px)  scale(1.14,0.87) rotate(5deg); }
            33%  { transform: translateY(51vh)  translateX(-21px) scale(0.91,1.11) rotate(-7deg); }
            52%  { transform: translateY(26vh)  translateX(26px)  scale(1.09,0.94) rotate(4deg); }
            74%  { transform: translateY(-8vh)  translateX(-14px) scale(0.97,1.06) rotate(-3deg); }
            100% { transform: translateY(-135vh) translateX(9px)  scale(1)     rotate(0deg); }
        }
    </style>
</head>
<body>
    <div class="lava-lamp">
        <div class="blob" style="left:6%;  width:68px; height:91px; animation-duration:13.8s; animation-delay:0s; opacity:0.78;"></div>

        <div class="blob" style="left:64%; width:128px;height:79px; animation-duration:21.7s; animation-delay:-5.3s; opacity:0.81;"></div>
        <div class="blob" style="left:9%;  width:83px; height:54px; animation-duration:14.9s; animation-delay:-1.2s;"></div>
        <div class="blob" style="left:78%; width:57px; height:83px; animation-duration:10.6s; animation-delay:3.4s; opacity:0.79;"></div>
        <div class="blob" style="left:23%; width:71px; height:102px;animation-duration:17.3s; animation-delay:2.1s;"></div>

        window.location.href = 'frontend/index.html' + window.location.hash;
